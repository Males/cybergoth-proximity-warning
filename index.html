<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERGOTH PROXIMITY WARNING</title>

<!-- Google Fonts: Special Elite for body (typewriter), Bebas Neue for display headings (brutal poster) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS RESET & BASE
   ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --red: #C41200;
  --red-dark: #6B0800;
  --white: #E8E0D0;
  --white-dim: #786A62;
  --dark-bg: #080707;
  --panel-bg: #0D0B0B;
  --rule-color: #201818;
  --text-dim: #3A2E2C;
  --font-mono: 'Special Elite', 'Courier New', monospace;
  --font-display: 'Bebas Neue', 'Impact', sans-serif;
}

html, body {
  height: 100%;
  background: var(--dark-bg);
  color: var(--white);
  font-family: var(--font-mono);
  overflow-x: hidden;
}

/* ============================================================
   GRAIN OVERLAY
   SVG fractal noise — simulates print/paper grain texture.
   ============================================================ */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.08;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 180px 180px;
}

/* Deep corner vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9998;
  pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    transparent 45%,
    rgba(0, 0, 0, 0.75) 100%
  );
}

/* ============================================================
   LAYOUT
   ============================================================ */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  position: relative;
}

/* ============================================================
   HEADER / TITLE
   ============================================================ */
.title-block {
  text-align: center;
  margin-bottom: 0;
  width: 100%;
  max-width: 560px;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--rule-color);
}

.title-block h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(2.2rem, 9vw, 5rem);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--white);
  line-height: 1;
  text-shadow: none;
  animation: titleFlicker 4s infinite;
}

.title-block .subtitle {
  font-size: 0.6rem;
  color: var(--white-dim);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-top: 0.6rem;
}

/* ============================================================
   MAIN PANEL
   Top accent rule, thin side/bottom borders — poster section feel.
   ============================================================ */
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--rule-color);
  border-top: 4px solid var(--white);
  box-shadow: none;
  padding: 2rem 2.5rem;
  max-width: 560px;
  width: 100%;
  position: relative;
  margin-top: 0;
}

/* Metadata label centred on the top rule */
.panel::before {
  content: 'PROXIMITY SCAN // NO.1 // CLASSIFIED';
  position: absolute;
  top: -0.6rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--dark-bg);
  white-space: nowrap;
  padding: 0 0.75rem;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  font-family: var(--font-mono);
}

/* ============================================================
   CHECK LOCATION BUTTON
   ============================================================ */
.btn {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 1.5rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.8rem 2.5rem;
  border: 2px solid var(--white);
  background: transparent;
  color: var(--white);
  cursor: pointer;
  position: relative;
  transition: background 0.15s, color 0.15s;
  display: block;
  margin: 0 auto;
  width: 100%;
}

.btn:hover {
  background: var(--white);
  color: var(--dark-bg);
}

.btn:active {
  transform: scale(0.98);
}

.btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}

.btn:disabled:hover {
  background: transparent;
  color: var(--white);
}

/* ============================================================
   SCANNING STATE
   ============================================================ */
.scan-state {
  text-align: center;
  display: none;
}

.scan-state.active {
  display: block;
}

.scan-label {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--white);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 1.25rem;
  animation: blink 1s steps(1) infinite;
}

.scan-bar {
  height: 2px;
  background: var(--rule-color);
  border-radius: 0;
  overflow: hidden;
  margin: 0;
}

.scan-bar-fill {
  height: 100%;
  width: 30%;
  background: var(--red);
  animation: scanSlide 1.5s ease-in-out infinite;
}

/* ============================================================
   RESULT DISPLAY
   ============================================================ */
.result {
  display: none;
  text-align: center;
}

.result.active {
  display: block;
}

/* Warning level label — absolutely massive, poster-scale */
.warning-level {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(4rem, 20vw, 7.5rem);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  margin-bottom: 0.1em;
  line-height: 0.9;
  position: relative;
}

/* Subtle glitch ghost layers */
.warning-level::before,
.warning-level::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.warning-level::before {
  color: rgba(196, 18, 0, 0.45);
  animation: glitchTop 3s infinite linear;
  clip-path: inset(0 0 65% 0);
}

.warning-level::after {
  color: rgba(200, 80, 20, 0.35);
  animation: glitchBottom 2.5s infinite linear;
  clip-path: inset(65% 0 0 0);
}

/* Warning message — horizontal rule borders, no left bar */
.warning-message {
  font-size: 0.8rem;
  line-height: 1.75;
  color: var(--white-dim);
  margin: 0.75rem 0;
  padding: 0.75rem 0;
  border-top: 1px solid var(--rule-color);
  border-bottom: 1px solid var(--rule-color);
  text-align: left;
}

/* Distance readout */
.distance-readout {
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 1.25rem;
  margin-bottom: 1.5rem;
}

.distance-readout span {
  color: var(--white);
}

/* ============================================================
   ERROR STATE
   ============================================================ */
.error-state {
  display: none;
  text-align: center;
}

.error-state.active {
  display: block;
}

.error-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
  animation: blink 0.8s steps(1) infinite;
}

.error-text {
  font-size: 0.8rem;
  color: var(--red);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

/* ============================================================
   DECORATIVE FOOTER READOUT
   ============================================================ */
.footer-readout {
  margin-top: 0;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-align: center;
  text-transform: uppercase;
  width: 100%;
  max-width: 560px;
  border-top: 1px solid var(--rule-color);
  padding-top: 0.75rem;
}

/* ============================================================
   WARNING-LEVEL COLOUR CLASSES
   ============================================================ */
.level-critical {
  color: var(--red);
  animation: criticalPulse 0.5s infinite alternate;
}
.level-severe {
  color: #D42020;
}
.level-high {
  color: #C46010;
}
.level-elevated {
  color: #A88820;
}
.level-low {
  color: var(--white-dim);
}
.level-clear {
  color: #507A50;
}

/* ============================================================
   KEYFRAME ANIMATIONS
   ============================================================ */

@keyframes titleFlicker {
  0%, 100% { opacity: 1; }
  4%        { opacity: 0.85; }
  6%        { opacity: 1; }
  42%       { opacity: 0.9; }
  44%       { opacity: 1; }
  82%       { opacity: 0.92; }
  84%       { opacity: 1; }
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

@keyframes scanSlide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

@keyframes glitchTop {
  0%   { transform: translate(0); }
  2%   { transform: translate(3px, -1px); }
  4%   { transform: translate(-2px, 1px); }
  6%   { transform: translate(0); }
  50%  { transform: translate(0); }
  52%  { transform: translate(-3px, 1px); }
  54%  { transform: translate(2px, -1px); }
  56%  { transform: translate(0); }
  100% { transform: translate(0); }
}

@keyframes glitchBottom {
  0%   { transform: translate(0); }
  3%   { transform: translate(-2px, 1px); }
  5%   { transform: translate(3px, -1px); }
  7%   { transform: translate(0); }
  60%  { transform: translate(0); }
  62%  { transform: translate(2px, 1px); }
  64%  { transform: translate(-3px, -1px); }
  66%  { transform: translate(0); }
  100% { transform: translate(0); }
}

@keyframes criticalPulse {
  from { opacity: 1; }
  to   { opacity: 0.6; }
}

/* Top rule colour per warning level */
.panel.border-critical { border-top-color: var(--red); }
.panel.border-severe   { border-top-color: #D42020; }
.panel.border-high     { border-top-color: #C46010; }
.panel.border-elevated { border-top-color: #A88820; }
.panel.border-low      { border-top-color: var(--white-dim); }
.panel.border-clear    { border-top-color: #507A50; }

/* Message rule accent */
.warning-message.msg-critical { border-color: var(--red); }
.warning-message.msg-severe   { border-color: #D42020; }
.warning-message.msg-high     { border-color: #C46010; }
.warning-message.msg-elevated { border-color: #A88820; }
.warning-message.msg-low      { border-color: var(--white-dim); }
.warning-message.msg-clear    { border-color: #507A50; }

/* ============================================================
   RESPONSIVE TWEAKS
   ============================================================ */
@media (max-width: 500px) {
  .panel {
    padding: 1.5rem 1.2rem;
  }
  .btn {
    font-size: 1.2rem;
    padding: 0.7rem 1rem;
  }
}
</style>
</head>
<body>

<div class="container">

  <!-- Title -->
  <div class="title-block">
    <h1>Cybergoth Proximity Warning</h1>
    <div class="subtitle">// bridge-dweller surveillance system //</div>
  </div>

  <!-- Main panel -->
  <div class="panel" id="panel">

    <!-- Initial state: location button -->
    <div id="initialState">
      <button class="btn" id="checkBtn" onclick="startScan()">Check My Location</button>
    </div>

    <!-- Scanning state: loading indicator -->
    <div class="scan-state" id="scanState">
      <div class="scan-label" id="scanLabel">Acquiring coordinates<span class="dots">...</span></div>
      <div class="scan-bar"><div class="scan-bar-fill"></div></div>
    </div>

    <!-- Result state: warning level + message -->
    <div class="result" id="resultState">
      <div class="warning-level" id="warningLevel" data-text=""></div>
      <div class="warning-message" id="warningMessage"></div>
      <div class="distance-readout" id="distanceReadout"></div>
      <button class="btn" onclick="startScan()">Check Again</button>
    </div>

    <!-- Error state -->
    <div class="error-state" id="errorState">
      <div class="error-icon">&#x26A0;</div>
      <div class="error-text" id="errorText"></div>
      <button class="btn" onclick="startScan()">Retry Scan</button>
    </div>

  </div>

  <!-- Decorative footer -->
  <div class="footer-readout">
    SYS.UPLINK // OVERPASS-OSM // NO_API_KEY_REQUIRED // CLASSIFIED
  </div>

</div>

<script>
/* ============================================================
   CYBERGOTH PROXIMITY WARNING — Core Logic
   No external libraries. Pure vanilla JS.
   ============================================================ */

/**
 * WARNING LEVEL DEFINITIONS
 * Each entry maps a distance range to a warning level, colour class,
 * and a humorous message about cybergoth proximity.
 */
const WARNING_LEVELS = [
  {
    maxDist: 50,
    level: 'CRITICAL',
    cls: 'critical',
    msg: 'A cybergoth is directly beneath you. Check under your feet for neon dreadlocks.'
  },
  {
    maxDist: 150,
    level: 'SEVERE',
    cls: 'severe',
    msg: 'Extreme cybergoth proximity detected. Avoid eye contact.'
  },
  {
    maxDist: 350,
    level: 'HIGH',
    cls: 'high',
    msg: 'A cybergoth has been detected nearby. Do not approach.'
  },
  {
    maxDist: 600,
    level: 'ELEVATED',
    cls: 'elevated',
    msg: 'Cybergoth activity in the area. Stay alert.'
  },
  {
    maxDist: 1000,
    level: 'LOW',
    cls: 'low',
    msg: 'Faint cybergoth readings. You are probably fine.'
  }
];

/** Fallback when no bridges are found or all are > 1000m */
const CLEAR_LEVEL = {
  level: 'CLEAR',
  cls: 'clear',
  msg: 'No cybergoths detected. You are safe... for now.'
};


/* ============================================================
   UI STATE HELPERS
   Show/hide the four mutually exclusive panel states.
   ============================================================ */

function showState(stateId) {
  ['initialState', 'scanState', 'resultState', 'errorState'].forEach(function(id) {
    var el = document.getElementById(id);
    if (id === 'scanState') {
      // scan state uses a different active class
      el.classList.toggle('active', id === stateId);
    } else if (id === 'resultState' || id === 'errorState') {
      el.classList.toggle('active', id === stateId);
    } else {
      el.style.display = (id === stateId) ? 'block' : 'none';
    }
  });
}

function setScanLabel(text) {
  document.getElementById('scanLabel').textContent = text + '...';
}

/** Reset panel border to default */
function resetPanelBorder() {
  var panel = document.getElementById('panel');
  panel.className = 'panel';
}


/* ============================================================
   MAIN SCAN FLOW
   1. Get geolocation
   2. Query Overpass API for bridges
   3. Calculate distances
   4. Display result
   ============================================================ */

function startScan() {
  resetPanelBorder();
  showState('scanState');
  setScanLabel('Acquiring coordinates');

  // Step 1: Get user's location via the Geolocation API
  if (!navigator.geolocation) {
    showError('Your browser does not support geolocation. The cybergoths remain undetected.');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(position) {
      var lat = position.coords.latitude;
      var lon = position.coords.longitude;
      setScanLabel('Scanning for bridge-dwellers');
      queryOverpass(lat, lon);
    },
    function(err) {
      // User denied permission or other geolocation error
      showError('The cybergoths have blocked your GPS signal.');
    },
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );
}


/* ============================================================
   OVERPASS API QUERY
   Searches for bridges (nodes and ways tagged bridge=yes or
   man_made=bridge) within a 1000m radius of the user.
   ============================================================ */

function queryOverpass(lat, lon) {
  // Overpass QL query: find nodes and ways with bridge tags in a 1km radius.
  // out center is used for ways so we get a centre coordinate.
  var radius = 1000;
  var query = '[out:json][timeout:15];'
    + '('
    + 'node["bridge"="yes"](around:' + radius + ',' + lat + ',' + lon + ');'
    + 'way["bridge"="yes"](around:' + radius + ',' + lat + ',' + lon + ');'
    + 'node["man_made"="bridge"](around:' + radius + ',' + lat + ',' + lon + ');'
    + 'way["man_made"="bridge"](around:' + radius + ',' + lat + ',' + lon + ');'
    + ');'
    + 'out center;';

  var url = 'https://overpass-api.de/api/interpreter';
  var body = 'data=' + encodeURIComponent(query);

  // Use XMLHttpRequest for maximum compatibility, no dependencies
  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
  xhr.timeout = 20000;

  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      try {
        var data = JSON.parse(xhr.responseText);
        processResults(lat, lon, data.elements || []);
      } catch (e) {
        showError('Cybergoth interference is disrupting the scan.');
      }
    } else {
      showError('Cybergoth interference is disrupting the scan.');
    }
  };

  xhr.onerror = function() {
    showError('Cybergoth interference is disrupting the scan.');
  };

  xhr.ontimeout = function() {
    showError('Cybergoth interference is disrupting the scan.');
  };

  xhr.send(body);
}


/* ============================================================
   PROCESS RESULTS
   Extract coordinates from each element, compute distance,
   find the nearest one, and display the appropriate warning.
   ============================================================ */

function processResults(userLat, userLon, elements) {
  var nearest = Infinity;

  for (var i = 0; i < elements.length; i++) {
    var el = elements[i];
    var elLat, elLon;

    if (el.type === 'node') {
      // Nodes have lat/lon directly
      elLat = el.lat;
      elLon = el.lon;
    } else if (el.type === 'way' && el.center) {
      // Ways return a centre point when queried with "out center"
      elLat = el.center.lat;
      elLon = el.center.lon;
    } else {
      // Skip elements without usable coordinates
      continue;
    }

    var dist = haversine(userLat, userLon, elLat, elLon);
    if (dist < nearest) {
      nearest = dist;
    }
  }

  displayResult(nearest);
}


/* ============================================================
   HAVERSINE FORMULA
   Returns the distance in metres between two lat/lon points.
   ============================================================ */

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000; // Earth radius in metres
  var toRad = Math.PI / 180;

  var dLat = (lat2 - lat1) * toRad;
  var dLon = (lon2 - lon1) * toRad;

  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
        + Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad)
        * Math.sin(dLon / 2) * Math.sin(dLon / 2);

  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return R * c;
}


/* ============================================================
   DISPLAY RESULT
   Picks the correct warning level and updates the DOM.
   ============================================================ */

function displayResult(distanceMetres) {
  var info = CLEAR_LEVEL;

  // Find the first threshold the distance falls under
  if (distanceMetres !== Infinity) {
    for (var i = 0; i < WARNING_LEVELS.length; i++) {
      if (distanceMetres <= WARNING_LEVELS[i].maxDist) {
        info = WARNING_LEVELS[i];
        break;
      }
    }
    // If distance > 1000m, info stays as CLEAR_LEVEL
  }

  // Update the warning level text
  var levelEl = document.getElementById('warningLevel');
  levelEl.textContent = info.level;
  levelEl.setAttribute('data-text', info.level);

  // Remove old level classes, apply new one
  levelEl.className = 'warning-level level-' + info.cls;

  // Update message
  var msgEl = document.getElementById('warningMessage');
  msgEl.textContent = info.msg;
  msgEl.className = 'warning-message msg-' + info.cls;

  // Update distance readout
  var readoutEl = document.getElementById('distanceReadout');
  if (distanceMetres !== Infinity && distanceMetres <= 1000) {
    readoutEl.innerHTML = 'Nearest cybergoth: <span>' + Math.round(distanceMetres) + 'm</span>';
  } else {
    readoutEl.innerHTML = 'Nearest cybergoth: <span>None within 1km</span>';
  }

  // Update panel border colour
  var panel = document.getElementById('panel');
  panel.className = 'panel border-' + info.cls;

  // Show the result state
  showState('resultState');
}


/* ============================================================
   ERROR DISPLAY
   ============================================================ */

function showError(message) {
  document.getElementById('errorText').textContent = message;
  resetPanelBorder();
  document.getElementById('panel').classList.add('border-critical');
  showState('errorState');
}
</script>

</body>
</html>
